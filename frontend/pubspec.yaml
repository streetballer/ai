name: streetballer
description: Find courts, organise pick-up games, and compete with others.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.8.1
  http: ^1.3.0
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.0.17
  google_maps_flutter: ^2.10.0
  geolocator: ^14.0.0
  mobile_scanner: ^7.0.1
  qr_flutter: ^4.1.0
  envied: ^0.5.4
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  envied_generator: ^0.5.4
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true

  # assets and fonts will be added as files are introduced
  # assets:
  #   - assets/icons/
  #   - assets/images/
  # fonts:
  #   - family: DM Sans
  #     fonts:
  #       - asset: assets/fonts/DMSans-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/DMSans-Bold.ttf
  #         weight: 700
